<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aneetta Mariya | Developer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#8b5cf6,#ec4899,#f59e0b);
background-size:300% 300%;
animation: gradientMove 8s ease infinite;
color:white;
text-align:center;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
font-size:18px;
margin-bottom:25px;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:30px;
background:white;
color:#333;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#111;
color:white;
}

</style>
</head>

<body>

<div class="container">
<h1>Hello, I'm Aneetta Mariya 👋</h1>
<p>Aspiring Developer & Future Tech Entrepreneur 🚀</p>
<button onclick="showMessage()">Click Me</button>
</div>

<script>
function showMessage(){
alert("Welcome to my first GitHub project! 🚀");
}
</script>

</body>
</html>
